<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Study Buddy</title>
  <style>
    body{
      font-family: Arial, sans-serif;
      margin:0;
      background:#f4f7ff;
      color:#222;
    }

    .wrap{
      max-width:900px;
      margin:0 auto;
      padding:24px;
    }

    .card{
      background:#fff;
      border-radius:16px;
      padding:20px;
      box-shadow:0 6px 18px rgba(0,0,0,0.08);
      margin-bottom:20px;
    }

    h1,h2{
      margin-top:0;
    }

    .row{
      display:flex;
      gap:12px;
      flex-wrap:wrap;
      align-items:center;
    }

    input{
      padding:12px;
      border:1px solid #ccc;
      border-radius:10px;
      min-width:220px;
    }

    button{
      padding:12px 18px;
      border:none;
      border-radius:10px;
      cursor:pointer;
      background:#3f6df6;
      color:#fff;
      font-weight:600;
    }

    button.secondary{
      background:#666;
    }

    button.danger{
      background:#d33;
    }

    .muted{
      color:#666;
    }

    .success{
      color:#0a8a35;
      font-weight:600;
    }

    .error{
      color:#c62828;
      font-weight:600;
    }

    .menu{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
      gap:16px;
      margin-top:16px;
    }

    .menu a{
      display:block;
      text-decoration:none;
      background:#eef3ff;
      padding:18px;
      border-radius:14px;
      color:#1d3f9e;
      font-weight:700;
      text-align:center;
    }

    .hidden{
      display:none;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Study Buddy</h1>
      <div id="auth-state" class="muted">Checking login…</div>
    </div>

    <div class="card" id="auth-card">
      <h2>Login / Register</h2>

      <div class="row" style="margin-bottom:12px;">
        <input id="auth-email" type="email" placeholder="Email" />
        <input id="auth-password" type="password" placeholder="Password" />
        <input id="auth-display-name" type="text" placeholder="Display name (for register)" />
      </div>

      <div class="row">
        <button id="login-btn" type="button">Login</button>
        <button id="register-btn" type="button">Register</button>
        <button id="logout-btn" type="button" class="danger hidden">Logout</button>
      </div>

      <div id="auth-status" class="muted" style="margin-top:12px;">Not logged in.</div>
    </div>

    <div class="card">
      <h2>Games</h2>
      <div class="menu">
        <a href="./game/words_production.html">Words Game</a>
        <a href="./game/reading.html">Reading Game</a>
        <a href="./game/math.html">Math Game</a>
        <a href="./game/creator.html">Lesson Creator</a>
      </div>
    </div>
  </div>

  <script type="module">
    import {
      login,
      register,
      bootAuth,
      logout,
      getSavedUser,
      setSessionExpiredHandler
    } from "./game/js/api.js";

    const qs = (id) => document.getElementById(id);

    function setStatus(id, text, type = "muted"){
      const el = qs(id);
      el.className = type;
      el.textContent = text;
    }

    function renderAuth(user = null){
      const logoutBtn = qs("logout-btn");

      if(user){
        setStatus("auth-state", `Logged in as ${user.display_name || user.email}`, "success");
        setStatus("auth-status", `Welcome back, ${user.display_name || user.email}`, "success");
        logoutBtn.classList.remove("hidden");
      }else{
        setStatus("auth-state", "Not logged in.", "muted");
        setStatus("auth-status", "Please login or register.", "muted");
        logoutBtn.classList.add("hidden");
      }
    }

    async function doLogin(){
      try{
        const email = qs("auth-email").value.trim();
        const password = qs("auth-password").value;
        const res = await login(email, password);
        renderAuth(res.user || null);
      }catch(err){
        setStatus("auth-status", err.message || "Login failed", "error");
      }
    }

    async function doRegister(){
      try{
        const email = qs("auth-email").value.trim();
        const password = qs("auth-password").value;
        const displayName = qs("auth-display-name").value.trim();
        const res = await register(email, password, displayName);
        renderAuth(res.user || null);
      }catch(err){
        setStatus("auth-status", err.message || "Register failed", "error");
      }
    }

    async function initAuth(){
      const savedUser = getSavedUser();
      if(savedUser){
        renderAuth(savedUser);
      }else{
        renderAuth(null);
      }

      const result = await bootAuth();
      if(result.ok && result.user){
        renderAuth(result.user);
      }else{
        renderAuth(null);
      }
    }

    function handleSessionExpired(){
      renderAuth(null);
      setStatus("auth-status", "Session expired. Please login again.", "error");
    }

    setSessionExpiredHandler(handleSessionExpired);

    qs("login-btn").addEventListener("click", doLogin);
    qs("register-btn").addEventListener("click", doRegister);
    qs("logout-btn").addEventListener("click", () => {
      logout();
      renderAuth(null);
      setStatus("auth-status", "Logged out.", "success");
    });

    initAuth();
  </script>
</body>
</html>
