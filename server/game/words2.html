<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Words Game</title>
  <style>
    body{
      font-family:Arial, sans-serif;
      margin:0;
      background:#f7f9ff;
      color:#222;
    }

    .wrap{
      max-width:1100px;
      margin:0 auto;
      padding:20px;
    }

    .card{
      background:#fff;
      border-radius:16px;
      padding:20px;
      margin-bottom:20px;
      box-shadow:0 6px 18px rgba(0,0,0,0.08);
    }

    .row{
      display:flex;
      gap:14px;
      flex-wrap:wrap;
    }

    .lesson-list{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
      gap:14px;
    }

    .lesson-card{
      background:#eef3ff;
      border-radius:14px;
      padding:16px;
    }

    .items-grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(170px,1fr));
      gap:14px;
      margin-top:16px;
    }

    .item-card{
      background:#fff;
      border:1px solid #e4e8f2;
      border-radius:14px;
      padding:12px;
      text-align:center;
    }

    .item-card img{
      width:120px;
      height:120px;
      object-fit:contain;
      background:#f4f4f4;
      border-radius:12px;
      display:block;
      margin:0 auto 10px;
    }

    button{
      padding:10px 14px;
      border:none;
      border-radius:10px;
      cursor:pointer;
      background:#3f6df6;
      color:#fff;
      font-weight:600;
    }

    .muted{ color:#666; }
    .success{ color:#0a8a35; font-weight:600; }
    .error{ color:#c62828; font-weight:600; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="row" style="justify-content:space-between;align-items:center;">
        <div>
          <h1 style="margin:0 0 8px 0;">Words Game</h1>
          <div id="auth-status" class="muted">Checking login…</div>
        </div>
        <div>
          <a href="../index.html">
            <button type="button">Back Home</button>
          </a>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="row" style="justify-content:space-between;align-items:center;">
        <h2 style="margin:0;">My Lessons</h2>
        <button id="refresh-lessons-btn" type="button">Refresh</button>
      </div>
      <div id="lessons-status" class="muted" style="margin-top:10px;">Loading lessons…</div>
      <div id="lesson-list" class="lesson-list" style="margin-top:16px;"></div>
    </div>

    <div class="card">
      <h2 id="current-lesson-title">Lesson Preview</h2>
      <div id="lesson-preview-status" class="muted">Choose a lesson.</div>
      <div id="items-grid" class="items-grid"></div>
    </div>
  </div>

  <script type="module">
    import {
      bootAuth,
      getSavedUser,
      getLessons,
      getImageUrl,
      setSessionExpiredHandler
    } from "./js/api.js";

    const qs = (id) => document.getElementById(id);

    let lessonsCache = [];
    let currentLesson = null;

    function setStatus(id, text, type = "muted"){
      const el = qs(id);
      el.className = type;
      el.textContent = text;
    }

    function renderAuth(user = null){
      if(user){
        setStatus("auth-status", `Logged in as ${user.display_name || user.email}`, "success");
      }else{
        setStatus("auth-status", "Not logged in. Please login on the home page.", "error");
      }
    }

    function normalizeItems(items){
      return (items || []).map(item => ({
        word: item.word || "",
        image: item.image || null,
        imageVersion: item.imageVersion || item.image_version || ""
      }));
    }

    function renderLessons(){
      const list = qs("lesson-list");
      list.innerHTML = "";

      if(!lessonsCache.length){
        setStatus("lessons-status", "No lessons found.", "muted");
        return;
      }

      setStatus("lessons-status", `${lessonsCache.length} lesson(s) found.`, "success");

      lessonsCache.forEach((lesson) => {
        const count = lesson?.data_json?.items?.length || 0;

        const div = document.createElement("div");
        div.className = "lesson-card";
        div.innerHTML = `
          <h3>${lesson.title}</h3>
          <div class="muted" style="margin-bottom:12px;">
            ${lesson.type} • ${lesson.visibility} • ${count} item(s)
          </div>
          <button class="open-lesson-btn" data-id="${lesson.id}">
            Open Lesson
          </button>
        `;
        list.appendChild(div);
      });
    }

    function renderLessonPreview(){
      const grid = qs("items-grid");
      grid.innerHTML = "";

      if(!currentLesson){
        qs("current-lesson-title").textContent = "Lesson Preview";
        setStatus("lesson-preview-status", "Choose a lesson.", "muted");
        return;
      }

      qs("current-lesson-title").textContent = currentLesson.title || "Lesson";
      setStatus("lesson-preview-status", "Lesson loaded.", "success");

      const items = normalizeItems(currentLesson?.data_json?.items || []);

      if(!items.length){
        setStatus("lesson-preview-status", "This lesson has no items yet.", "muted");
        return;
      }

      items.forEach((item) => {
        const card = document.createElement("div");
        card.className = "item-card";

        card.innerHTML = `
          ${
            item.image?.thumb
              ? `<img src="${getImageUrl(item.image.thumb, item.imageVersion)}" alt="${item.word || ""}" />`
              : `<div style="width:120px;height:120px;margin:0 auto 10px;background:#f4f4f4;border-radius:12px;display:flex;align-items:center;justify-content:center;color:#888;">No image</div>`
          }
          <div><strong>${item.word || "(empty)"}</strong></div>
        `;

        grid.appendChild(card);
      });
    }

    async function loadLessons(){
      try{
        const res = await getLessons();
        lessonsCache = Array.isArray(res.lessons) ? res.lessons : [];
        renderLessons();
      }catch(err){
        setStatus("lessons-status", err.message || "Could not load lessons.", "error");
      }
    }

    function openLesson(lessonId){
      currentLesson = lessonsCache.find(l => l.id === lessonId) || null;
      renderLessonPreview();
    }

    async function initPage(){
      const savedUser = getSavedUser();
      renderAuth(savedUser || null);

      const auth = await bootAuth();
      renderAuth(auth.user || null);

      if(auth.ok){
        await loadLessons();
      }else{
        setStatus("lessons-status", "Please login first on the home page.", "error");
      }
    }

    function handleSessionExpired(){
      renderAuth(null);
      setStatus("lessons-status", "Session expired. Please login again.", "error");
      setStatus("lesson-preview-status", "Session expired.", "error");
    }

    setSessionExpiredHandler(handleSessionExpired);

    qs("refresh-lessons-btn").addEventListener("click", loadLessons);

    document.addEventListener("click", (e) => {
      const btn = e.target.closest(".open-lesson-btn");
      if(btn){
        openLesson(btn.dataset.id);
      }
    });

    initPage();
  </script>
</body>
</html>
